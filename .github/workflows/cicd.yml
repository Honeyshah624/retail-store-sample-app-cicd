name: Retail Store CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: retail-store-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}

  GITOPS_REPOSITORY: ${{ vars.GITOPS_REPOSITORY }}
  GITOPS_BRANCH: ${{ vars.GITOPS_BRANCH }}
  GITOPS_MANIFEST: ${{ vars.GITOPS_MANIFEST }}

jobs:
  # =========================================================
  # 1. TESTS, COVERAGE, SONARQUBE AND QUALITY GATE
  # =========================================================
  quality:
    name: Tests, Coverage and SonarQube
    runs-on: ubuntu-latest
    timeout-minutes: 75

    # Dummy AWS values are used only by local DynamoDB
    # Testcontainers integration tests.
    env:
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_EC2_METADATA_DISABLED: "true"

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go from catalog go.mod
        uses: actions/setup-go@v6
        with:
          go-version-file: src/catalog/go.mod
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify tools and Docker
        shell: bash
        run: |
          set -euo pipefail

          echo "===== Java ====="
          java -version

          echo
          echo "===== Maven ====="
          mvn --version

          echo
          echo "===== Go ====="
          go version
          grep -E '^(go|toolchain) ' src/catalog/go.mod || true

          echo
          echo "===== Node.js ====="
          node --version
          npm --version

          echo
          echo "===== Docker ====="
          docker version
          docker info

      - name: Run Maven tests
        shell: bash
        run: |
          set -euo pipefail

          maven_services=(
            ui
            cart
            orders
          )

          for service in "${maven_services[@]}"; do
            directory="src/${service}"

            echo
            echo "===================================================="
            echo "Testing Maven service: ${service}"
            echo "===================================================="

            if [ ! -f "${directory}/pom.xml" ]; then
              echo "pom.xml not found: ${directory}/pom.xml"
              exit 1
            fi

            (
              cd "${directory}"

              mvn \
                --batch-mode \
                --no-transfer-progress \
                clean test
            )
          done

      - name: Run Catalog Go tests and coverage
        working-directory: src/catalog
        shell: bash
        run: |
          set -euo pipefail

          go mod download

          go test ./... \
            -covermode=atomic \
            -coverprofile=coverage.out

          go tool cover \
            -func=coverage.out

      - name: Run Checkout Node.js tests
        working-directory: src/checkout
        shell: bash
        env:
          CI: "true"
        run: |
          set -euo pipefail

          if [ -f package-lock.json ]; then
            npm ci

            if node -e \
              "const p=require('./package.json'); process.exit(p.scripts?.test ? 0 : 1)"; then
              npm test -- --coverage
            else
              echo "No npm test script configured."
            fi

          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --immutable

            if node -e \
              "const p=require('./package.json'); process.exit(p.scripts?.test ? 0 : 1)"; then
              yarn test --coverage
            else
              echo "No Yarn test script configured."
            fi

          elif [ -f package.json ]; then
            npm install

            if node -e \
              "const p=require('./package.json'); process.exit(p.scripts?.test ? 0 : 1)"; then
              npm test -- --coverage
            else
              echo "No Node.js test script configured."
            fi

          else
            echo "No package.json found in src/checkout."
            exit 1
          fi

      - name: Show test failure details
        if: failure()
        shell: bash
        run: |
          echo "===== Maven Surefire reports ====="

          find src \
            -path "*/target/surefire-reports/*.txt" \
            -type f \
            -print \
            -exec sh -c '
              echo "----------------------------------------"
              echo "File: $1"
              cat "$1"
            ' _ {} \; || true

          echo
          echo "===== Docker containers ====="

          docker ps -a || true

          for container in $(docker ps -aq); do
            echo
            echo "===== Logs for container ${container} ====="
            docker logs "${container}" 2>&1 || true
          done

      - name: Validate SonarQube secrets
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -euo pipefail

          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "SONAR_TOKEN secret is missing."
            exit 1
          fi

          if [ -z "${SONAR_HOST_URL:-}" ]; then
            echo "SONAR_HOST_URL secret is missing."
            exit 1
          fi

          if [ ! -f sonar-project.properties ]; then
            echo "sonar-project.properties is missing."
            exit 1
          fi

          echo "SonarQube secrets and configuration are present."

      - name: Test SonarQube connectivity
        shell: bash
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -euo pipefail

          sonar_url="${SONAR_HOST_URL%/}"

          echo "Testing SonarQube connectivity..."

          curl \
            --fail \
            --show-error \
            --silent \
            --connect-timeout 20 \
            --max-time 45 \
            "${sonar_url}/api/system/status"

          echo
          echo "SonarQube is reachable."

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Check SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 15
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          retention-days: 7
          if-no-files-found: warn
          path: |
            src/**/coverage.out
            src/**/coverage/
            src/**/build/reports/
            src/**/build/test-results/
            src/**/target/classes/
            src/**/target/surefire-reports/
            src/**/target/failsafe-reports/
            src/**/target/site/
            src/**/test-results/
            .scannerwork/report-task.txt

  # =========================================================
  # 2. BUILD, TRIVY, ECR AND GITOPS
  # =========================================================
  build-scan-push:
    name: Build, Scan, Push and Update GitOps
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 120

    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Validate required GitHub variables
        shell: bash
        run: |
          set -euo pipefail

          required_variables=(
            AWS_REGION
            AWS_ROLE_ARN
            ECR_REGISTRY
            GITOPS_REPOSITORY
            GITOPS_BRANCH
            GITOPS_MANIFEST
          )

          for variable in "${required_variables[@]}"; do
            if [ -z "${!variable:-}" ]; then
              echo "Missing GitHub variable: ${variable}"
              exit 1
            fi
          done

          echo "Required variables are configured."

      - name: Validate GitOps token
        shell: bash
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GITOPS_TOKEN:-}" ]; then
            echo "GITOPS_TOKEN secret is missing."
            exit 1
          fi

          echo "GITOPS_TOKEN is configured."

      - name: Generate immutable image tag
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_TAG="${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "${GITHUB_ENV}"
          echo "Generated image tag: ${IMAGE_TAG}"

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: retail-store-${{ github.run_id }}
          mask-aws-account-id: false

      - name: Verify assumed AWS role
        shell: bash
        run: |
          set -euo pipefail

          aws sts get-caller-identity

      - name: Verify ECR repositories
        shell: bash
        run: |
          set -euo pipefail

          repositories=(
            retail-store-ui
            retail-store-catalog
            retail-store-cart
            retail-store-orders
            retail-store-checkout
          )

          for repository in "${repositories[@]}"; do
            echo "Checking repository: ${repository}"

            aws ecr describe-repositories \
              --region "${AWS_REGION}" \
              --repository-names "${repository}" \
              --no-cli-pager
          done

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Validate Dockerfiles
        shell: bash
        run: |
          set -euo pipefail

          services=(
            ui
            catalog
            cart
            orders
            checkout
          )

          for service in "${services[@]}"; do
            dockerfile="src/${service}/Dockerfile"

            if [ ! -f "${dockerfile}" ]; then
              echo "Dockerfile missing: ${dockerfile}"
              exit 1
            fi

            echo "Found ${dockerfile}"
          done

      - name: Build application Docker images
        shell: bash
        run: |
          set -euo pipefail

          services=(
            ui
            catalog
            cart
            orders
            checkout
          )

          for service in "${services[@]}"; do
            image="${ECR_REGISTRY}/retail-store-${service}:${IMAGE_TAG}"

            echo
            echo "Building ${image}"

            docker build \
              --pull \
              --tag "${image}" \
              "src/${service}"
          done

      # Version 0.35.0 is an immutable known-safe Trivy action release.
      - name: Scan UI image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/retail-store-ui:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Scan Catalog image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/retail-store-catalog:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Scan Cart image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/retail-store-cart:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Scan Orders image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/retail-store-orders:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Scan Checkout image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/retail-store-checkout:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Push images to Amazon ECR
        shell: bash
        run: |
          set -euo pipefail

          services=(
            ui
            catalog
            cart
            orders
            checkout
          )

          for service in "${services[@]}"; do
            image="${ECR_REGISTRY}/retail-store-${service}:${IMAGE_TAG}"

            echo
            echo "Pushing ${image}"

            docker push "${image}"
          done

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: ${{ env.GITOPS_BRANCH }}
          path: gitops
          fetch-depth: 0
          persist-credentials: true

      - name: Validate GitOps manifest
        working-directory: gitops
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "${GITOPS_MANIFEST}" ]; then
            echo "GitOps manifest not found: ${GITOPS_MANIFEST}"

            echo
            echo "Available files:"

            find . \
              -maxdepth 6 \
              -type f \
              | sort

            exit 1
          fi

          echo "Using GitOps manifest: ${GITOPS_MANIFEST}"

      - name: Update GitOps image references
        working-directory: gitops
        shell: bash
        run: |
          set -euo pipefail

          file="${GITOPS_MANIFEST}"

          services=(
            ui
            catalog
            cart
            orders
            checkout
          )

          declare -A public_images=(
            [ui]="public.ecr.aws/aws-containers/retail-store-sample-ui"
            [catalog]="public.ecr.aws/aws-containers/retail-store-sample-catalog"
            [cart]="public.ecr.aws/aws-containers/retail-store-sample-cart"
            [orders]="public.ecr.aws/aws-containers/retail-store-sample-orders"
            [checkout]="public.ecr.aws/aws-containers/retail-store-sample-checkout"
          )

          for service in "${services[@]}"; do
            new_image="${ECR_REGISTRY}/retail-store-${service}:${IMAGE_TAG}"

            echo "Updating ${service} to ${new_image}"

            # First pipeline execution:
            # public ECR image → private ECR image.
            sed -i -E \
              "s|${public_images[$service]}:[^[:space:]\"']+|${new_image}|g" \
              "${file}"

            # Later executions:
            # previous private ECR tag → new private ECR tag.
            sed -i -E \
              "s|${ECR_REGISTRY}/retail-store-${service}:[^[:space:]\"']+|${new_image}|g" \
              "${file}"
          done

      - name: Verify GitOps image updates
        working-directory: gitops
        shell: bash
        run: |
          set -euo pipefail

          file="${GITOPS_MANIFEST}"

          services=(
            ui
            catalog
            cart
            orders
            checkout
          )

          for service in "${services[@]}"; do
            expected_image="${ECR_REGISTRY}/retail-store-${service}:${IMAGE_TAG}"

            if ! grep -Fq "${expected_image}" "${file}"; then
              echo "Image update failed for service: ${service}"
              echo "Expected image: ${expected_image}"
              exit 1
            fi
          done

          echo
          echo "Updated application images:"

          grep -nF \
            "${ECR_REGISTRY}/retail-store-" \
            "${file}"

      - name: Commit and push GitOps update
        working-directory: gitops
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${GITOPS_MANIFEST}"

          if git diff --cached --quiet; then
            echo "No GitOps changes detected."
            exit 0
          fi

          git commit \
            -m "Deploy retail store ${IMAGE_TAG}"

          git pull \
            --rebase \
            origin "${GITOPS_BRANCH}"

          git push \
            origin \
            "HEAD:${GITOPS_BRANCH}"

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## Retail Store CI/CD Deployment"
            echo
            echo "- Image tag: \`${IMAGE_TAG}\`"
            echo "- ECR registry: \`${ECR_REGISTRY}\`"
            echo "- GitOps repository: \`${GITOPS_REPOSITORY}\`"
            echo "- GitOps manifest: \`${GITOPS_MANIFEST}\`"
            echo "- Argo CD will deploy the GitOps commit automatically."
          } >> "${GITHUB_STEP_SUMMARY}"
