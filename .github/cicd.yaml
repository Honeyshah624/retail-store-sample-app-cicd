name: Retail Store CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: retail-store-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}

  GITOPS_REPOSITORY: ${{ vars.GITOPS_REPOSITORY }}
  GITOPS_BRANCH: ${{ vars.GITOPS_BRANCH }}
  GITOPS_MANIFEST: ${{ vars.GITOPS_MANIFEST }}

jobs:
  # ==========================================================
  # 1. UNIT TESTS AND CODE COVERAGE
  # ==========================================================
  test:
    name: Unit Tests and Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/catalog/go.mod
          cache: true
          cache-dependency-path: src/catalog/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/checkout/package-lock.json

      - name: Run UI tests
        working-directory: src/ui
        shell: bash
        run: |
          set -euo pipefail

          chmod +x gradlew
          ./gradlew clean test

      - name: Run Cart tests
        working-directory: src/cart
        shell: bash
        run: |
          set -euo pipefail

          chmod +x gradlew
          ./gradlew clean test

      - name: Run Orders tests
        working-directory: src/orders
        shell: bash
        run: |
          set -euo pipefail

          chmod +x gradlew
          ./gradlew clean test

      - name: Run Catalog tests with coverage
        working-directory: src/catalog
        shell: bash
        run: |
          set -euo pipefail

          go test ./... \
            -covermode=atomic \
            -coverprofile=coverage.out

          go tool cover -func=coverage.out

      - name: Run Checkout tests
        working-directory: src/checkout
        shell: bash
        run: |
          set -euo pipefail

          if [ -f package-lock.json ]; then
            npm ci
            npm test -- --coverage
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --immutable
            yarn test --coverage
          else
            echo "No package-lock.json or yarn.lock found in src/checkout"
            exit 1
          fi

      - name: Upload coverage and test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          if-no-files-found: warn
          retention-days: 7
          path: |
            src/catalog/coverage.out
            src/ui/build/reports/
            src/cart/build/reports/
            src/orders/build/reports/
            src/checkout/coverage/

  # ==========================================================
  # 2. SONARQUBE SCAN AND QUALITY GATE
  # ==========================================================
  sonar:
    name: SonarQube Scan and Quality Gate
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage reports
        uses: actions/download-artifact@v5
        with:
          name: coverage-reports
          path: .

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Check SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ==========================================================
  # 3. BUILD, SCAN, PUSH AND UPDATE GITOPS
  # ==========================================================
  build-scan-push:
    name: Build, Scan, Push and Update GitOps
    needs:
      - test
      - sonar

    if: github.event_name != 'pull_request'

    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v6

      - name: Validate required variables
        shell: bash
        run: |
          set -euo pipefail

          required_variables=(
            AWS_REGION
            AWS_ROLE_ARN
            ECR_REGISTRY
            GITOPS_REPOSITORY
            GITOPS_BRANCH
            GITOPS_MANIFEST
          )

          for variable in "${required_variables[@]}"; do
            if [ -z "${!variable:-}" ]; then
              echo "Required GitHub variable is missing: ${variable}"
              exit 1
            fi
          done

      - name: Generate immutable image tag
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_TAG="${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "${GITHUB_ENV}"
          echo "Generated image tag: ${IMAGE_TAG}"

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: retail-store-${{ github.run_id }}
          mask-aws-account-id: false

      - name: Verify assumed AWS role
        shell: bash
        run: |
          set -euo pipefail

          aws sts get-caller-identity

      - name: Verify ECR repositories
        shell: bash
        run: |
          set -euo pipefail

          aws ecr describe-repositories \
            --region "${AWS_REGION}" \
            --repository-names \
              retail-store-ui \
              retail-store-catalog \
              retail-store-cart \
              retail-store-orders \
              retail-store-checkout

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Build application images
        shell: bash
        run: |
          set -euo pipefail

          services=(
            ui
            catalog
            cart
            orders
            checkout
          )

          for service in "${services[@]}"; do
            image="${ECR_REGISTRY}/retail-store-${service}:${IMAGE_TAG}"

            echo "Building ${image}"

            if [ ! -f "src/${service}/Dockerfile" ]; then
              echo "Dockerfile not found: src/${service}/Dockerfile"
              exit 1
            fi

            docker build \
              --pull \
              --tag "${image}" \
              "src/${service}"
          done

      - name: Scan images with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ env.ECR_REGISTRY }}/retail-store-ui:${{ env.IMAGE_TAG }}"
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Scan remaining images with Trivy
        shell: bash
        run: |
          set -euo pipefail

          services=(
            catalog
            cart
            orders
            checkout
          )

          for service in "${services[@]}"; do
            image="${ECR_REGISTRY}/retail-store-${service}:${IMAGE_TAG}"

            echo "Scanning ${image}"

            trivy image \
              --scanners vuln \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 0 \
              "${image}"
          done

      - name: Push application images to ECR
        shell: bash
        run: |
          set -euo pipefail

          services=(
            ui
            catalog
            cart
            orders
            checkout
          )

          for service in "${services[@]}"; do
            image="${ECR_REGISTRY}/retail-store-${service}:${IMAGE_TAG}"

            echo "Pushing ${image}"
            docker push "${image}"
          done

      - name: Checkout GitOps repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: ${{ env.GITOPS_BRANCH }}
          path: gitops
          fetch-depth: 0
          persist-credentials: true

      - name: Validate GitOps manifest
        working-directory: gitops
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "${GITOPS_MANIFEST}" ]; then
            echo "GitOps manifest does not exist:"
            echo "${GITOPS_MANIFEST}"
            echo
            echo "Available files:"
            find environments -type f | sort
            exit 1
          fi

          echo "Using GitOps manifest:"
          echo "${GITOPS_MANIFEST}"

      - name: Update GitOps image references
        working-directory: gitops
        shell: bash
        run: |
          set -euo pipefail

          file="${GITOPS_MANIFEST}"

          declare -A public_images=(
            [ui]="public.ecr.aws/aws-containers/retail-store-sample-ui"
            [catalog]="public.ecr.aws/aws-containers/retail-store-sample-catalog"
            [cart]="public.ecr.aws/aws-containers/retail-store-sample-cart"
            [orders]="public.ecr.aws/aws-containers/retail-store-sample-orders"
            [checkout]="public.ecr.aws/aws-containers/retail-store-sample-checkout"
          )

          services=(
            ui
            catalog
            cart
            orders
            checkout
          )

          for service in "${services[@]}"; do
            private_image="${ECR_REGISTRY}/retail-store-${service}:${IMAGE_TAG}"

            # First pipeline run:
            # replace public ECR image with private ECR image.
            sed -i -E \
              "s|${public_images[$service]}:[^[:space:]\"']+|${private_image}|g" \
              "${file}"

            # Later pipeline runs:
            # replace the previous private ECR image tag.
            sed -i -E \
              "s|${ECR_REGISTRY}/retail-store-${service}:[^[:space:]\"']+|${private_image}|g" \
              "${file}"
          done

      - name: Verify GitOps image updates
        working-directory: gitops
        shell: bash
        run: |
          set -euo pipefail

          file="${GITOPS_MANIFEST}"

          services=(
            ui
            catalog
            cart
            orders
            checkout
          )

          for service in "${services[@]}"; do
            expected_image="${ECR_REGISTRY}/retail-store-${service}:${IMAGE_TAG}"

            if ! grep -Fq "${expected_image}" "${file}"; then
              echo "Image update failed for service: ${service}"
              echo "Expected: ${expected_image}"
              exit 1
            fi
          done

          echo "Updated application images:"
          grep -nF "${ECR_REGISTRY}/retail-store-" "${file}"

      - name: Commit and push GitOps changes
        working-directory: gitops
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${GITOPS_MANIFEST}"

          if git diff --cached --quiet; then
            echo "No GitOps changes detected."
            exit 0
          fi

          git commit \
            -m "Deploy retail store ${IMAGE_TAG}"

          git pull \
            --rebase \
            origin "${GITOPS_BRANCH}"

          git push \
            origin \
            "HEAD:${GITOPS_BRANCH}"

      - name: Pipeline summary
        shell: bash
        run: |
          {
            echo "## Retail Store Deployment"
            echo
            echo "- Image tag: \`${IMAGE_TAG}\`"
            echo "- ECR registry: \`${ECR_REGISTRY}\`"
            echo "- GitOps repository: \`${GITOPS_REPOSITORY}\`"
            echo "- GitOps manifest: \`${GITOPS_MANIFEST}\`"
            echo "- Argo CD will deploy the GitOps commit automatically."
          } >> "${GITHUB_STEP_SUMMARY}"